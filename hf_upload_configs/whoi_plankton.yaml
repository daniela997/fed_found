# ============================================================
# METADATA
# ============================================================
pretty_name: "WHOI-Plankton (2006-2014): annotated IFCB plankton images"

description: |
  WHOI-Plankton is a fine-grained classification dataset of microscopic marine
  plankton images captured with an Imaging FlowCytobot (IFCB) at the Martha's
  Vineyard Coastal Observatory (MVCO) by the Woods Hole Oceanographic
  Institution (WHOI). This release aggregates all nine per-year subsets
  (2006-2014) from the MBL/WHOI archive into a single ImageFolder, with
  ~3.5 million expert-annotated images across 103 categories of phytoplankton,
  microzooplankton, and other particle types.

  The categories include named taxa (e.g. `Akashiwo`, `Chaetoceros_didymus`,
  `Pseudonitzschia`), morphotype groupings (e.g. `Strombidium_morphotype1`,
  `pennate_morphotype1`), and non-plankton categories (`bead`, `bubble`,
  `detritus`, `mix`, `bad`). The dataset is heavily long-tailed: a small
  number of common classes dominate, with rare classes containing only a few
  hundred images.

  Each image's filename encodes its acquisition timestamp and year, e.g.
  `IFCB1_2009_127_165234_03914.png`. The year is preserved in the filename
  for downstream temporal-split analyses but is not exposed as a separate
  feature column.

  Per-year archives were sourced from the MBL/WHOI archive
  (DOI 10.1575/1912/7341) and merged via symlinks; the canonical dataset
  card lives at the original WHOI archive.

