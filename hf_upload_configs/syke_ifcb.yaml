# SYKE-plankton IFCB 2022 upload config.
#
# Source data: SYKE-plankton_IFCB_2022 (Kraft et al. 2022)
#   B2SHARE: https://b2share.eudat.eu/records/abf913e5a6ad47e6baa273ae0ed6617a
#   DOI:     10.23728/b2share.abf913e5a6ad47e6baa273ae0ed6617a
#
# Local data: /scratch/datasets/DEAL/Plankton/IFCB/SYKE-IFCB/SYKE_published
# ImageFolder layout: 50 class dirs, 63,074 PNGs total.
#
# Split protocol (matches /home/daniela/baselines/syke-pic/train_syke_dataset.ini):
#   - Per-class shuffle with random seed 24
#   - 60% train / 20% validation / 20% test
#   - No min_N or max_N filtering
#   - Excludes class "Unclassifiable" (no-op for this dump: no such directory present)

# ============================================================
# REQUIRED
# ============================================================
data_dir: /scratch/datasets/DEAL/Plankton/IFCB/SYKE-IFCB/SYKE_published

hf_dataset_name: syke-plankton-ifcb-2022
hf_org_name: danielaivanova

# ============================================================
# SPLIT PROTOCOL
# ============================================================
split_ratios: [0.6, 0.2, 0.2]
split_random_seed: 24
exclude_classes:
  - Unclassifiable

# ============================================================
# METADATA
# ============================================================
pretty_name: "SYKE-plankton IFCB 2022"

description: |
  Phytoplankton images captured with an Imaging FlowCytobot (IFCB; McLane
  Research Laboratories, Olson and Sosik 2007) from the Baltic Sea, manually
  annotated by expert taxonomists at the Finnish Environment Institute (SYKE)
  Marine Research Centre. Approximately 63,000 images across 50 expert-labeled
  classes covering Cyanophyceae, Cryptophyceae, Euglenophyceae, Dinophyceae,
  Diatomophyceae, Chrysophyceae, Chlorophyta, Ciliates, and additional
  categories (heterocyte, beads).

  This release provides **predefined train / validation / test splits** so
  downstream code can reproduce a fixed splitting protocol without
  re-implementing it:

    - Per-class shuffle with random seed 24
    - 60% train / 20% validation / 20% test
    - No `min_N` / `max_N` class-size filtering applied
    - Class `Unclassifiable` would be excluded (no images present in this dump)

  Each row in any split contains `image` (PIL.Image PNG, mixed RGB / grayscale
  depending on the source image) and `label` (HuggingFace ClassLabel, 50
  classes).

  ## Collection sites

  - Utö Atmospheric and Marine Research Station (59°46.84' N, 21°22.13' E),
    2017-2018, continuous deployment (Laakso et al. 2018; Kraft et al. 2021).
    Operated by the Finnish Environment Institute (SYKE) and the Finnish
    Meteorological Institute (FMI).
  - M/S Finnmaid and Silja Serenade Alg@line ferrybox systems, 2016 and 2019;
    water samples were manually processed in the laboratory (Ruokanen et al.
    2003; Kaitala et al. 2014).

  ## Notes on labeling

  The image filenames may refer to older class names (e.g. the
  `Cryptophyceae-Teleaulax` folder contains images originally labeled
  `Cryptophyceae_drop`, `Cryptophyceae_small`, or `Teleaulax sp.`) that were
  joined or revised. The class list and labeled set are continuous works in
  progress; the data set published under the source DOI will not be revised.
  See Kraft et al. 2022 for the full class definitions and example images.

