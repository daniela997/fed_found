# SYKE-plankton ZooScan 2024 upload config.
#
# Source: Kareinen et al. 2024 (ECCV 2024 OOD Generalization workshop)
# Local re-extracted data: /scratch/daniela/DEAL/Plankton/SYKE-plankton_ZooScan_2024_clean
#
# Splits: predefined in the dataset's own JSON file. Train / valid / test, with
# 5 classes (Eggs, Fish_eggs, Harpacticoida, Mysis_sp, Sessilia) appearing only
# in the test split -- these are the open-set recognition "unknowns" from the
# original paper.

# ============================================================
# REQUIRED
# ============================================================
data_dir: /scratch/daniela/DEAL/Plankton/SYKE-plankton_ZooScan_2024_clean/SYKE-plankton_ZooScan_2024/images/SYKE-plankton_ZooScan_2024

