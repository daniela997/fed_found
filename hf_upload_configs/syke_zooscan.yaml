# ============================================================
# METADATA
# ============================================================
pretty_name: "SYKE-plankton ZooScan 2024"

description: |
  Zooplankton image dataset for training and evaluating closed-set and
  open-set plankton recognition methods. Approximately 24,000 expert-labeled
  single-specimen images across 20 classes (zooplankton species or other
  particles), collected with a ZooScan instrument from Baltic Sea water
  samples and annotated by an expert taxonomist.

  This release provides the **predefined train / validation / test splits**
  used in Kareinen et al. (2024) so downstream code can reproduce their
  evaluation protocol directly. Each row contains `image` (PIL.Image JPEG)
  and `label` (HuggingFace ClassLabel, 20 classes).

  ## Open-set "unknowns"

  Five classes appear **only in the test split**, with zero images in train
  or validation:

    - Eggs
    - Fish_eggs
    - Harpacticoida
    - Mysis_sp
    - Sessilia

  These were held out from training entirely to serve as "unknown" classes
  in the open-set recognition (OSR) experiments in Kareinen et al. (2024).
  For a standard closed-set classification task, you may want to drop the
  test-only classes (or merge them into a single "unknown" bucket) -- this
  release leaves them intact so the OSR protocol is reproducible.

  Image filenames in each class folder use the pattern `<Class>_NNN.jpg`.
  Filenames in the original `splits.json` are relative to the per-class
  directory (`<class>/<filename>`).

  ## Closed-set classes (in train/valid/test)

    Bivalvia, Bivalvia_multiple, Bosmina_sp, Bubbles, Ceriodaphnia_sp,
    Copepoda_calanoida, Copepoda_cyclopoida, Copepoda_nauplius, Daphnia_sp,
    Evadne_sp, Fibers_etc, Gastropoda, Podon_sp, Polychaeta, Synchaeta_sp.

  ## Citation

  Kareinen, J., Skyttä, A., Eerola, T., Kraft, K., Lensu, L., Suikkanen, S.,
  Lehtiniemi, M., & Kälviäinen, H. (2024). Open-Set Plankton Recognition.
  Out of Distribution Generalization in Computer Vision workshop, ECCV 2024.

