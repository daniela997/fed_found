# Example upload config for an IFCB plankton dataset.
# Copy this file to a new name (e.g. `whoi_2024.yaml`) per dataset.
#
# Required fields below are marked REQUIRED. Recommended fields fill in the
# dataset card; missing values produce a less polished card but won't break
# the upload.
#
# Run:
#   python upload_to_hf.py hf_upload_configs/<your_config>.yaml [--dry-run]

# ============================================================
# REQUIRED
# ============================================================

# Path to the ImageFolder root on disk. Must contain `<class_name>/*.jpg` (or .png).
data_dir: /scratch/datasets/DEAL/Plankton/IFCB/IFCB_Annotated_Training_Library_FINAL

# What the dataset will be called on HuggingFace.
hf_dataset_name: whoi-ifcb-deal-2024

# Your HF user or org name.
hf_org_name: daniela-ivanova  # change to your HF username or org

# ============================================================
# RECOMMENDED METADATA
# ============================================================

# Human-readable name shown at the top of the dataset card.
pretty_name: "WHOI IFCB Plankton (DEAL collection)"

# Multi-line description (markdown OK). Explain what's in the dataset,
# how it was collected, what makes it interesting.
description: |
  Plankton images captured with an Imaging FlowCytobot (IFCB, McLane Research Laboratories)
  at Woods Hole, MA. Annotated by expert taxonomists at WHOI as part of the DEAL project.

  The dataset contains roughly N images across M expert-labeled categories of marine
  phytoplankton and microzooplankton, organized in ImageFolder layout. Class labels are
  the IFCB folk names; a separate WoRMS-aligned taxonomic mapping is available in the
  IFCB_annotated_class_labels_final CSV (not included in this dataset).

# License of the original data. Common options: cc-by-4.0, cc-by-nc-4.0, mit, apache-2.0
license: cc-by-nc-4.0

# Where to find the original / canonical data source.
source_url: "https://hdl.handle.net/10.1575/1912/7341"

# Plain-text citation (APA-style is conventional).
citation_apa: |
  Sosik, H. M., Peacock, E. E., & Brownlee, E. F. (2014). Annotated Plankton Images -
  Data Set for Developing and Evaluating Classification Methods. Woods Hole
  Oceanographic Institution. https://hdl.handle.net/10.1575/1912/7341

# BibTeX entry for the original publication / dataset.
citation_bibtex: |
  @misc{sosik2014whoi,
    title  = {Annotated Plankton Images - Data Set for Developing and Evaluating Classification Methods},
    author = {Sosik, Heidi M. and Peacock, Emily E. and Brownlee, Emily F.},
    year   = {2014},
    publisher = {Woods Hole Oceanographic Institution},
    doi    = {10.1575/1912/7341},
  }

# Optional: paperswithcode + arxiv identifiers if there's a benchmark paper.
paperswithcode_id: ""
arxiv_id: ""

# ============================================================
# BEHAVIOR
# ============================================================

# private=true means only you can see the dataset on HF until you flip it public.
hf_private: true

# Set HF_TOKEN env var instead, or paste a token here (NOT recommended to commit).
# hf_token: hf_...

# Number of processes for ImageFolder loading.
num_proc: 8

# Retry pushes this many times if HF returns transient errors.
push_to_hub_retries: 5

# Walk every image and remove corrupt files before uploading. Slow on large datasets.
check_image_file_integrity: false

# ============================================================
# DATASET CARD TAGS (HF native)
# ============================================================

task_categories:
  - image-classification
task_ids:
  - multi-class-image-classification
annotations_creators:
  - expert-generated
language:
  - en
# Free-form tags (searchable on HF):
tags:
  - plankton
  - microscopy
  - ifcb
  - oceanography
